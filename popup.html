<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
      --bg: #0c100e;
      --panel: #131a16;
      --line: #243029;
      --text: #d7e4dd;
      --dim: #76857e;
      --accent: #7adcb4;
      --warn: #e0b35a;
      --danger: #d95757;
    }
    * { box-sizing: border-box; }
    body {
      width: 280px;
      max-height: 520px;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font: 12.5px/1.45 "SF Mono", ui-monospace, Menlo, monospace;
      overflow-y: auto;
    }
    body::-webkit-scrollbar { width: 4px; }
    body::-webkit-scrollbar-thumb { background: var(--line); border-radius: 4px; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 14px 10px;
      border-bottom: 1px solid var(--line);
      position: sticky; top: 0; background: var(--bg); z-index: 2;
    }
    h1 { font-size: 13px; margin: 0; letter-spacing: 0.06em; }
    h1 span { color: var(--accent); }

    /* -- Sections -------------------------------------------------------- */
    .section-label {
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--dim);
      padding: 10px 14px 4px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .section-label .count {
      font-size: 9px;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 1px 5px;
      border-radius: 99px;
    }
    .rows { padding: 2px 6px 6px; }

    /* -- Row toggle ------------------------------------------------------- */
    label.row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 8px;
      border-radius: 5px;
      cursor: pointer;
    }
    label.row:hover { background: var(--panel); }
    .info { flex: 1; min-width: 0; }
    .name { display: block; font-size: 12px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .hint { color: var(--dim); font-size: 10px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    /* toggle switch */
    input[type="checkbox"] {
      appearance: none;
      width: 28px; height: 15px;
      background: var(--line);
      border-radius: 999px;
      position: relative;
      cursor: pointer;
      transition: background 120ms;
      flex: none;
    }
    input[type="checkbox"]::after {
      content: "";
      position: absolute;
      top: 2px; left: 2px;
      width: 11px; height: 11px;
      border-radius: 50%;
      background: var(--dim);
      transition: transform 120ms, background 120ms;
    }
    input[type="checkbox"]:checked { background: #1d3a2d; }
    input[type="checkbox"]:checked::after {
      transform: translateX(13px);
      background: var(--accent);
    }

    /* -- Custom rules ----------------------------------------------------- */
    .custom-entry {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 8px;
      border-radius: 5px;
    }
    .custom-entry:hover { background: var(--panel); }
    .custom-entry .info { flex: 1; min-width: 0; }
    .custom-entry .value { font-size: 11.5px; display: block; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .custom-entry .type-badge {
      font-size: 9px;
      color: var(--dim);
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 0 4px;
      border-radius: 3px;
      flex: none;
    }
    .del-btn {
      background: none; border: none; color: var(--dim); cursor: pointer;
      font-size: 14px; padding: 0 2px; line-height: 1; flex: none;
    }
    .del-btn:hover { color: var(--danger); }

    .empty-msg {
      color: var(--dim);
      font-size: 10.5px;
      padding: 6px 14px 8px;
      font-style: italic;
    }

    /* -- Add form --------------------------------------------------------- */
    .add-area {
      padding: 6px 10px 10px;
      border-top: 1px solid var(--line);
    }
    .add-row {
      display: flex;
      gap: 4px;
    }
    .add-input {
      flex: 1;
      min-width: 0;
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--text);
      font: inherit;
      font-size: 11.5px;
      padding: 5px 7px;
      outline: none;
    }
    .add-input::placeholder { color: var(--dim); }
    .add-input:focus { border-color: var(--accent); }

    .type-toggle {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 5px;
      color: var(--dim);
      font: inherit;
      font-size: 10px;
      padding: 4px 6px;
      cursor: pointer;
      flex: none;
      transition: color 120ms, border-color 120ms;
    }
    .type-toggle:hover, .type-toggle.active {
      color: var(--accent);
      border-color: var(--accent);
    }

    .add-btn {
      background: #1d3a2d;
      border: 1px solid var(--accent);
      border-radius: 5px;
      color: var(--accent);
      font: inherit;
      font-size: 11px;
      padding: 4px 8px;
      cursor: pointer;
      flex: none;
      transition: opacity 120ms;
    }
    .add-btn:hover { opacity: 0.8; }
    .add-hint {
      color: var(--dim);
      font-size: 9.5px;
      padding: 4px 2px 0;
    }

    footer {
      border-top: 1px solid var(--line);
      padding: 7px 14px 9px;
      color: var(--dim);
      font-size: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>sensi<span>blur</span></h1>
    <input type="checkbox" id="enabled" title="Enable / disable" />
  </header>

  <div class="section-label">Built-in patterns</div>
  <div class="rows" id="builtinRows">
    <label class="row"><span class="info"><span class="name">ID keyword</span><span class="hint">"ID: ABC-123", "Member ID 99"</span></span><input type="checkbox" data-pattern="idKeyword" /></label>
    <label class="row"><span class="info"><span class="name"># numbers</span><span class="hint">#12345, Order #88-291</span></span><input type="checkbox" data-pattern="hashNumber" /></label>
    <label class="row"><span class="info"><span class="name">Long digits</span><span class="hint">accounts, tracking, OTPs</span></span><input type="checkbox" data-pattern="longDigits" /></label>
    <label class="row"><span class="info"><span class="name">Money</span><span class="hint">$1,234.56  €500  £12.99</span></span><input type="checkbox" data-pattern="money" /></label>
    <label class="row"><span class="info"><span class="name">SSN</span><span class="hint">123-45-6789</span></span><input type="checkbox" data-pattern="ssn" /></label>
    <label class="row"><span class="info"><span class="name">Phone</span><span class="hint">(555) 123-4567</span></span><input type="checkbox" data-pattern="phone" /></label>
    <label class="row"><span class="info"><span class="name">Email addresses</span><span class="hint">user@example.com</span></span><input type="checkbox" data-pattern="email" /></label>
    <label class="row"><span class="info"><span class="name">Credit card</span><span class="hint">4242 4242 4242 4242</span></span><input type="checkbox" data-pattern="creditCard" /></label>
    <label class="row"><span class="info"><span class="name">Date of birth</span><span class="hint">DOB: 01/15/1990</span></span><input type="checkbox" data-pattern="dob" /></label>
    <label class="row"><span class="info"><span class="name">Street address</span><span class="hint">123 Main St Apt 4B</span></span><input type="checkbox" data-pattern="address" /></label>
    <label class="row"><span class="info"><span class="name">IP address</span><span class="hint">192.168.1.1</span></span><input type="checkbox" data-pattern="ipAddress" /></label>
    <label class="row"><span class="info"><span class="name">Passport</span><span class="hint">Passport: AB1234567</span></span><input type="checkbox" data-pattern="passport" /></label>
    <label class="row"><span class="info"><span class="name">API keys / tokens</span><span class="hint">sk_live_..., ghp_..., xoxb-...</span></span><input type="checkbox" data-pattern="apiKey" /></label>
    <label class="row"><span class="info"><span class="name">Bank labels</span><span class="hint">Account: ..., Routing: ...</span></span><input type="checkbox" data-pattern="bankLabels" /></label>
    <label class="row"><span class="info"><span class="name">Confirmation codes</span><span class="hint">Confirmation: ABC123XYZ</span></span><input type="checkbox" data-pattern="confirmCodes" /></label>
    <label class="row"><span class="info"><span class="name">Usernames</span><span class="hint">username: foo, login: bar</span></span><input type="checkbox" data-pattern="username" /></label>
  </div>

  <div class="section-label">Custom rules <span class="count" id="customCount">0</span></div>
  <div class="rows" id="customRows"></div>
  <div class="empty-msg" id="customEmpty">no custom rules yet</div>

  <div class="add-area">
    <div class="add-row">
      <input class="add-input" id="addInput" placeholder="keyword or /regex/" spellcheck="false" />
      <button class="type-toggle" id="typeToggle" title="Switch keyword / regex">kw</button>
      <button class="add-btn" id="addBtn">+</button>
    </div>
    <div class="add-hint" id="addHint">type a word, name, or phrase to blur</div>
  </div>

  <footer>click any pixelated text in Gmail to reveal it</footer>
  <script src="popup.js"></script>
</body>
</html>
